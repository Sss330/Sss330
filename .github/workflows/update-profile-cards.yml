name: Update profile cards

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate profile cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: Sss330
        run: |
          mkdir -p profile

          cat > generate_profile_cards.py <<'PY'
          import os
          import json
          import math
          import datetime
          import urllib.request
          from xml.sax.saxutils import escape

          USERNAME = os.environ["GITHUB_USERNAME"]
          TOKEN = os.environ["GITHUB_TOKEN"]

          API_URL = "https://api.github.com/graphql"

          now = datetime.datetime.utcnow()
          year_ago = now - datetime.timedelta(days=365)

          query = """
          query($login: String!, $from: DateTime!, $to: DateTime!) {
            user(login: $login) {
              login
              name
              repositories(first: 100, ownerAffiliations: OWNER, privacy: PUBLIC) {
                totalCount
                nodes {
                  name
                  stargazerCount
                  forkCount
                  languages(first: 10, orderBy: {field: SIZE, direction: DESC}) {
                    edges {
                      size
                      node {
                        name
                        color
                      }
                    }
                  }
                }
              }
              contributionsCollection(from: $from, to: $to) {
                contributionCalendar {
                  totalContributions
                }
                totalCommitContributions
                totalIssueContributions
                totalPullRequestContributions
                totalPullRequestReviewContributions
              }
            }
          }
          """

          payload = {
              "query": query,
              "variables": {
                  "login": USERNAME,
                  "from": year_ago.isoformat() + "Z",
                  "to": now.isoformat() + "Z",
              },
          }

          request = urllib.request.Request(
              API_URL,
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {TOKEN}",
                  "Content-Type": "application/json",
              },
          )

          with urllib.request.urlopen(request) as response:
              result = json.loads(response.read().decode("utf-8"))

          if "errors" in result:
              raise RuntimeError(result["errors"])

          user = result["data"]["user"]
          repos = user["repositories"]["nodes"]
          repo_count = user["repositories"]["totalCount"]

          total_stars = sum(repo["stargazerCount"] for repo in repos)

          contributions = user["contributionsCollection"]
          total_contributions = contributions["contributionCalendar"]["totalContributions"]
          total_commits = contributions["totalCommitContributions"]
          total_prs = contributions["totalPullRequestContributions"]
          total_issues = contributions["totalIssueContributions"]
          total_reviews = contributions["totalPullRequestReviewContributions"]

          if total_contributions >= 1000:
              grade = "S"
          elif total_contributions >= 500:
              grade = "A+"
          elif total_contributions >= 200:
              grade = "A"
          elif total_contributions >= 100:
              grade = "B+"
          elif total_contributions >= 50:
              grade = "B"
          else:
              grade = "C"

          def write_stats_svg():
              left_stats = [
                  ("★ Total Stars Earned:", total_stars),
                  ("⑂ Total Repositories:", repo_count),
                  ("◌ Contributions last year:", total_contributions),
                  ("↳ Commits last year:", total_commits),
              ]

              right_stats = []

              if total_prs > 0:
                  right_stats.append(("↱ Pull Requests:", total_prs))
              if total_issues > 0:
                  right_stats.append(("● Issues:", total_issues))
              if total_reviews > 0:
                  right_stats.append(("◆ Reviews:", total_reviews))

              left_svg = []
              y = 62

              for label, value in left_stats:
                  left_svg.append(f'<text x="25" y="{y}" class="stat">{escape(label)}</text>')
                  left_svg.append(f'<text x="230" y="{y}" class="value">{value}</text>')
                  y += 22

              right_svg = []
              y = 62

              for label, value in right_stats:
                  right_svg.append(f'<text x="300" y="{y}" class="stat">{escape(label)}</text>')
                  right_svg.append(f'<text x="445" y="{y}" class="value">{value}</text>')
                  y += 22

              svg = f'''<svg width="495" height="165" viewBox="0 0 495 165" fill="none" xmlns="http://www.w3.org/2000/svg" role="img">
            <style>
              .header {{ font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #58A6FF; }}
              .stat {{ font: 600 13px 'Segoe UI', Ubuntu, Sans-Serif; fill: #C3D1D9; }}
              .value {{ font: 700 13px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F0F6FC; }}
              .grade {{ font: 700 28px 'Segoe UI', Ubuntu, Sans-Serif; fill: #C3D1D9; }}
            </style>

            <rect x="0.5" y="0.5" rx="4.5" width="494" height="164" fill="#0D1117" stroke="#30363D" stroke-opacity="0"/>

            <text x="25" y="35" class="header">Yaroslav's GitHub Stats</text>

            {''.join(left_svg)}
            {''.join(right_svg)}

            <circle cx="410" cy="118" r="28" fill="none" stroke="#388BFD" stroke-width="6"/>
            <text x="392" y="127" class="grade">{grade}</text>
          </svg>'''

              with open("profile/stats.svg", "w", encoding="utf-8") as file:
                  file.write(svg)

          language_stats = {}

          for repo in repos:
              for edge in repo["languages"]["edges"]:
                  lang = edge["node"]["name"]
                  color = edge["node"]["color"] or "#8B949E"
                  size = edge["size"]

                  if lang not in language_stats:
                      language_stats[lang] = {
                          "size": 0,
                          "color": color,
                      }

                  language_stats[lang]["size"] += size

          all_languages = sorted(
              language_stats.items(),
              key=lambda item: item[1]["size"],
              reverse=True,
          )

          total_all_language_size = sum(item[1]["size"] for item in all_languages) or 1

          top_languages = []

          for lang, data in all_languages:
              percent = data["size"] / total_all_language_size * 100

              # Hide tiny/noisy languages like Dockerfile 0.59%
              if percent >= 1:
                  top_languages.append((lang, data))

              if len(top_languages) == 5:
                  break

          if not top_languages:
              top_languages = all_languages[:5]

          def arc_path(cx, cy, r, start_angle, end_angle):
              start = math.radians(start_angle)
              end = math.radians(end_angle)

              x1 = cx + r * math.cos(start)
              y1 = cy + r * math.sin(start)
              x2 = cx + r * math.cos(end)
              y2 = cy + r * math.sin(end)

              large_arc = 1 if end_angle - start_angle > 180 else 0

              return f"M {x1:.2f} {y1:.2f} A {r} {r} 0 {large_arc} 1 {x2:.2f} {y2:.2f}"

          def write_top_languages_svg():
              rows = []
              donut = []
              start_angle = -90

              for index, (lang, data) in enumerate(top_languages):
                  percent = data["size"] / total_all_language_size * 100
                  color = data["color"]
                  y = 60 + index * 23

                  rows.append(f'''
            <circle cx="30" cy="{y - 4}" r="5" fill="{color}" />
            <text x="45" y="{y}" class="lang">{escape(lang)} {percent:.2f}%</text>''')

                  end_angle = start_angle + percent / 100 * 360

                  donut.append(f'''
            <path d="{arc_path(255, 95, 42, start_angle, end_angle)}"
                  stroke="{color}"
                  stroke-width="10"
                  fill="none"
                  stroke-linecap="butt" />''')

                  start_angle = end_angle

              svg = f'''<svg width="350" height="165" viewBox="0 0 350 165" fill="none" xmlns="http://www.w3.org/2000/svg" role="img">
            <style>
              .header {{ font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #58A6FF; }}
              .lang {{ font: 400 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #C3D1D9; }}
            </style>

            <rect x="0.5" y="0.5" rx="4.5" width="349" height="164" fill="#0D1117" stroke="#30363D" stroke-opacity="0"/>

            <text x="25" y="35" class="header">Most Used Languages</text>

            {''.join(rows)}

            <circle cx="255" cy="95" r="42" fill="none" stroke="#30363D" stroke-width="10"/>
            {''.join(donut)}
          </svg>'''

              with open("profile/top-langs.svg", "w", encoding="utf-8") as file:
                  file.write(svg)

          write_stats_svg()
          write_top_languages_svg()
          PY

          python3 generate_profile_cards.py

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update profile cards" || exit 0
          git push
