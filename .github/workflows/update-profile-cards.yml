name: Update profile cards

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate profile overview
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: Sss330
        run: |
          mkdir -p profile

          cat > generate_profile_cards.py <<'PY'
          import os
          import json
          import math
          import datetime
          import urllib.request
          from xml.sax.saxutils import escape

          USERNAME = os.environ["GITHUB_USERNAME"]
          TOKEN = os.environ["GITHUB_TOKEN"]
          API_URL = "https://api.github.com/graphql"

          now = datetime.datetime.utcnow()
          year_ago = now - datetime.timedelta(days=365)

          query = """
          query($login: String!, $from: DateTime!, $to: DateTime!) {
            user(login: $login) {
              repositories(first: 100, ownerAffiliations: OWNER, privacy: PUBLIC) {
                totalCount
                nodes {
                  name
                  stargazerCount
                  languages(first: 10, orderBy: {field: SIZE, direction: DESC}) {
                    edges {
                      size
                      node {
                        name
                        color
                      }
                    }
                  }
                }
              }
              contributionsCollection(from: $from, to: $to) {
                contributionCalendar {
                  totalContributions
                  weeks {
                    contributionDays {
                      date
                      contributionCount
                    }
                  }
                }
                totalCommitContributions
                totalIssueContributions
                totalPullRequestContributions
                totalPullRequestReviewContributions
              }
            }
          }
          """

          payload = {
              "query": query,
              "variables": {
                  "login": USERNAME,
                  "from": year_ago.isoformat() + "Z",
                  "to": now.isoformat() + "Z",
              },
          }

          request = urllib.request.Request(
              API_URL,
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {TOKEN}",
                  "Content-Type": "application/json",
                  "User-Agent": "profile-overview-generator",
              },
          )

          with urllib.request.urlopen(request) as response:
              result = json.loads(response.read().decode("utf-8"))

          if "errors" in result:
              raise RuntimeError(result["errors"])

          user = result["data"]["user"]
          repos = user["repositories"]["nodes"]
          repo_count = user["repositories"]["totalCount"]

          contributions = user["contributionsCollection"]
          calendar = contributions["contributionCalendar"]

          total_stars = sum(repo["stargazerCount"] for repo in repos)
          total_contributions = calendar["totalContributions"]
          total_commits = contributions["totalCommitContributions"]
          total_prs = contributions["totalPullRequestContributions"]
          total_issues = contributions["totalIssueContributions"]
          total_reviews = contributions["totalPullRequestReviewContributions"]

          if total_contributions >= 1000:
              grade = "S"
          elif total_contributions >= 500:
              grade = "A+"
          elif total_contributions >= 200:
              grade = "A"
          elif total_contributions >= 100:
              grade = "B+"
          elif total_contributions >= 50:
              grade = "B"
          else:
              grade = "C"

          contribution_days = []

          for week in calendar["weeks"]:
              for day in week["contributionDays"]:
                  contribution_days.append({
                      "date": datetime.date.fromisoformat(day["date"]),
                      "count": day["contributionCount"],
                  })

          contribution_days.sort(key=lambda item: item["date"])

          def calculate_current_streak(days):
              if not days:
                  return 0

              today = datetime.datetime.utcnow().date()
              days_by_date = {item["date"]: item["count"] for item in days}

              current_date = today

              if days_by_date.get(current_date, 0) == 0:
                  current_date = current_date - datetime.timedelta(days=1)

              streak = 0

              while days_by_date.get(current_date, 0) > 0:
                  streak += 1
                  current_date = current_date - datetime.timedelta(days=1)

              return streak

          def calculate_longest_streak(days):
              longest = 0
              current = 0

              for item in days:
                  if item["count"] > 0:
                      current += 1
                      longest = max(longest, current)
                  else:
                      current = 0

              return longest

          current_streak = calculate_current_streak(contribution_days)
          longest_streak = calculate_longest_streak(contribution_days)

          language_stats = {}

          for repo in repos:
              for edge in repo["languages"]["edges"]:
                  lang = edge["node"]["name"]
                  color = edge["node"]["color"] or "#8B949E"
                  size = edge["size"]

                  if lang not in language_stats:
                      language_stats[lang] = {
                          "size": 0,
                          "color": color,
                      }

                  language_stats[lang]["size"] += size

          all_languages = sorted(
              language_stats.items(),
              key=lambda item: item[1]["size"],
              reverse=True,
          )

          total_language_size = sum(item[1]["size"] for item in all_languages) or 1

          top_languages = []

          for lang, data in all_languages:
              percent = data["size"] / total_language_size * 100

              if percent >= 1:
                  top_languages.append((lang, data))

              if len(top_languages) == 5:
                  break

          if not top_languages:
              top_languages = all_languages[:5]

          def arc_path(cx, cy, r, start_angle, end_angle):
              start = math.radians(start_angle)
              end = math.radians(end_angle)

              x1 = cx + r * math.cos(start)
              y1 = cy + r * math.sin(start)
              x2 = cx + r * math.cos(end)
              y2 = cy + r * math.sin(end)

              large_arc = 1 if end_angle - start_angle > 180 else 0

              return f"M {x1:.2f} {y1:.2f} A {r} {r} 0 {large_arc} 1 {x2:.2f} {y2:.2f}"

          main_stats = [
              ("Total Stars Earned", total_stars),
              ("Total Repositories", repo_count),
              ("Contributions last year", total_contributions),
              ("Commits last year", total_commits),
          ]

          extra_stats = []
          if total_prs > 0:
              extra_stats.append(("Pull Requests", total_prs))
          if total_issues > 0:
              extra_stats.append(("Issues", total_issues))
          if total_reviews > 0:
              extra_stats.append(("Reviews", total_reviews))

          left_stats_svg = []
          y = 108
          for label, value in main_stats:
              left_stats_svg.append(f'''
            <text x="95" y="{y}" class="stat-label">{escape(label)}</text>
            <text x="420" y="{y}" class="stat-value">{value}</text>''')
              y += 30

          extra_svg = []
          if extra_stats:
              chip_x = 95
              chip_y = 196
              for index, (label, value) in enumerate(extra_stats[:3]):
                  x = chip_x + index * 120
                  extra_svg.append(f'''
            <rect x="{x}" y="{chip_y}" width="104" height="28" rx="14" fill="#0D1117" stroke="#1F2937" />
            <text x="{x + 14}" y="{chip_y + 18}" class="chip-label">{escape(label)}</text>
            <text x="{x + 90}" y="{chip_y + 18}" class="chip-value">{value}</text>''')

          language_rows = []
          donut_paths = []
          start_angle = -90

          for index, (lang, data) in enumerate(top_languages):
              percent = data["size"] / total_language_size * 100
              color = data["color"]
              y = 108 + index * 34
              bar_width = max(18, 150 * (percent / 100))

              language_rows.append(f'''
            <circle cx="660" cy="{y - 6}" r="7" fill="{color}" />
            <text x="680" y="{y}" class="lang-name">{escape(lang)}</text>
            <text x="845" y="{y}" class="lang-percent">{percent:.2f}%</text>
            <rect x="680" y="{y + 10}" width="150" height="6" rx="3" fill="#1F2937" />
            <rect x="680" y="{y + 10}" width="{bar_width:.2f}" height="6" rx="3" fill="{color}" />''')

              end_angle = start_angle + percent / 100 * 360

              donut_paths.append(f'''
            <path d="{arc_path(965, 145, 64, start_angle, end_angle)}"
                  stroke="{color}"
                  stroke-width="18"
                  fill="none"
                  stroke-linecap="butt" />''')

              start_angle = end_angle

          svg = f'''<svg width="1100" height="390" viewBox="0 0 1100 390" fill="none" xmlns="http://www.w3.org/2000/svg" role="img">
            <defs>
              <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.25"/>
              </filter>
            </defs>

            <style>
              .panel-title {{ font: 700 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #58A6FF; }}
              .stat-label {{ font: 600 16px 'Segoe UI', Ubuntu, Sans-Serif; fill: #C3D1D9; }}
              .stat-value {{ font: 700 16px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F0F6FC; text-anchor: end; }}
              .lang-name {{ font: 600 16px 'Segoe UI', Ubuntu, Sans-Serif; fill: #C3D1D9; }}
              .lang-percent {{ font: 700 15px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F0F6FC; text-anchor: end; }}
              .metric-number {{ font: 800 36px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F0F6FC; text-anchor: middle; dominant-baseline: middle; }}
              .metric-label {{ font: 600 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #C3D1D9; text-anchor: middle; }}
              .grade {{ font: 800 34px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F0F6FC; text-anchor: middle; dominant-baseline: middle; }}
              .chip-label {{ font: 600 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #8B949E; }}
              .chip-value {{ font: 700 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #C3D1D9; text-anchor: end; }}
            </style>

            <rect x="18" y="18" width="1064" height="354" rx="20" fill="#0D1117" stroke="#1F2937" filter="url(#shadow)" />

            <rect x="40" y="40" width="500" height="190" rx="18" fill="#111827" stroke="#1F2937" />
            <rect x="560" y="40" width="500" height="190" rx="18" fill="#111827" stroke="#1F2937" />
            <rect x="40" y="250" width="1020" height="100" rx="18" fill="#111827" stroke="#1F2937" />

            <text x="65" y="72" class="panel-title">Yaroslav's GitHub Stats</text>
            {''.join(left_stats_svg)}
            {''.join(extra_svg)}

            <circle cx="470" cy="140" r="38" fill="none" stroke="#58A6FF" stroke-width="8"/>
            <text x="470" y="140" class="grade">{grade}</text>

            <text x="585" y="72" class="panel-title">Most Used Languages</text>
            {''.join(language_rows)}

            <circle cx="965" cy="145" r="64" fill="none" stroke="#1F2937" stroke-width="18"/>
            {''.join(donut_paths)}

            <line x1="380" y1="268" x2="380" y2="332" stroke="#1F2937" stroke-width="2"/>
            <line x1="720" y1="268" x2="720" y2="332" stroke="#1F2937" stroke-width="2"/>

            <g transform="translate(210 0)">
              <text x="0" y="296" class="metric-number">{total_contributions}</text>
              <text x="0" y="326" class="metric-label">Total Contributions</text>
            </g>

            <g transform="translate(550 0)">
              <circle cx="0" cy="290" r="40" fill="none" stroke="#58A6FF" stroke-width="8"/>
              <text x="0" y="290" class="metric-number">{current_streak}</text>
              <text x="0" y="334" class="metric-label">Current Streak</text>
            </g>

            <g transform="translate(890 0)">
              <text x="0" y="296" class="metric-number">{longest_streak}</text>
              <text x="0" y="326" class="metric-label">Longest Streak</text>
            </g>
          </svg>'''

          with open("profile/overview.svg", "w", encoding="utf-8") as file:
              file.write(svg)

          PY

          python3 generate_profile_cards.py

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update profile cards" || exit 0
          git push
