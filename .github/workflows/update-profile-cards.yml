name: Update profile cards

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate profile overview
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: Sss330
        run: |
          mkdir -p profile

          cat > generate_profile_cards.py <<'PY'
          import os
          import json
          import math
          import datetime
          import urllib.request
          from xml.sax.saxutils import escape

          USERNAME = os.environ["GITHUB_USERNAME"]
          TOKEN = os.environ["GITHUB_TOKEN"]

          API_URL = "https://api.github.com/graphql"

          now = datetime.datetime.utcnow()
          year_ago = now - datetime.timedelta(days=365)

          query = """
          query($login: String!, $from: DateTime!, $to: DateTime!) {
            user(login: $login) {
              repositories(first: 100, ownerAffiliations: OWNER, privacy: PUBLIC) {
                totalCount
                nodes {
                  name
                  stargazerCount
                  languages(first: 10, orderBy: {field: SIZE, direction: DESC}) {
                    edges {
                      size
                      node {
                        name
                        color
                      }
                    }
                  }
                }
              }
              contributionsCollection(from: $from, to: $to) {
                contributionCalendar {
                  totalContributions
                  weeks {
                    contributionDays {
                      date
                      contributionCount
                    }
                  }
                }
                totalCommitContributions
                totalIssueContributions
                totalPullRequestContributions
                totalPullRequestReviewContributions
              }
            }
          }
          """

          payload = {
              "query": query,
              "variables": {
                  "login": USERNAME,
                  "from": year_ago.isoformat() + "Z",
                  "to": now.isoformat() + "Z",
              },
          }

          request = urllib.request.Request(
              API_URL,
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {TOKEN}",
                  "Content-Type": "application/json",
              },
          )

          with urllib.request.urlopen(request) as response:
              result = json.loads(response.read().decode("utf-8"))

          if "errors" in result:
              raise RuntimeError(result["errors"])

          user = result["data"]["user"]

          repos = user["repositories"]["nodes"]
          repo_count = user["repositories"]["totalCount"]

          contributions = user["contributionsCollection"]
          calendar = contributions["contributionCalendar"]

          total_stars = sum(repo["stargazerCount"] for repo in repos)
          total_contributions = calendar["totalContributions"]
          total_commits = contributions["totalCommitContributions"]
          total_prs = contributions["totalPullRequestContributions"]
          total_issues = contributions["totalIssueContributions"]
          total_reviews = contributions["totalPullRequestReviewContributions"]

          if total_contributions >= 1000:
              grade = "S"
          elif total_contributions >= 500:
              grade = "A+"
          elif total_contributions >= 200:
              grade = "A"
          elif total_contributions >= 100:
              grade = "B+"
          elif total_contributions >= 50:
              grade = "B"
          else:
              grade = "C"

          contribution_days = []

          for week in calendar["weeks"]:
              for day in week["contributionDays"]:
                  contribution_days.append({
                      "date": datetime.date.fromisoformat(day["date"]),
                      "count": day["contributionCount"],
                  })

          contribution_days.sort(key=lambda item: item["date"])

          def calculate_current_streak(days):
              if not days:
                  return 0

              today = datetime.datetime.utcnow().date()
              days_by_date = {item["date"]: item["count"] for item in days}

              current_date = today

              if days_by_date.get(current_date, 0) == 0:
                  current_date = current_date - datetime.timedelta(days=1)

              streak = 0

              while days_by_date.get(current_date, 0) > 0:
                  streak += 1
                  current_date = current_date - datetime.timedelta(days=1)

              return streak

          def calculate_longest_streak(days):
              longest = 0
              current = 0

              for item in days:
                  if item["count"] > 0:
                      current += 1
                      longest = max(longest, current)
                  else:
                      current = 0

              return longest

          current_streak = calculate_current_streak(contribution_days)
          longest_streak = calculate_longest_streak(contribution_days)

          language_stats = {}

          for repo in repos:
              for edge in repo["languages"]["edges"]:
                  lang = edge["node"]["name"]
                  color = edge["node"]["color"] or "#8B949E"
                  size = edge["size"]

                  if lang not in language_stats:
                      language_stats[lang] = {
                          "size": 0,
                          "color": color,
                      }

                  language_stats[lang]["size"] += size

          all_languages = sorted(
              language_stats.items(),
              key=lambda item: item[1]["size"],
              reverse=True,
          )

          total_language_size = sum(item[1]["size"] for item in all_languages) or 1

          top_languages = []

          for lang, data in all_languages:
              percent = data["size"] / total_language_size * 100

              if percent >= 1:
                  top_languages.append((lang, data))

              if len(top_languages) == 5:
                  break

          if not top_languages:
              top_languages = all_languages[:5]

          def arc_path(cx, cy, r, start_angle, end_angle):
              start = math.radians(start_angle)
              end = math.radians(end_angle)

              x1 = cx + r * math.cos(start)
              y1 = cy + r * math.sin(start)
              x2 = cx + r * math.cos(end)
              y2 = cy + r * math.sin(end)

              large_arc = 1 if end_angle - start_angle > 180 else 0

              return f"M {x1:.2f} {y1:.2f} A {r} {r} 0 {large_arc} 1 {x2:.2f} {y2:.2f}"

          def stat_row(label, value, x, y):
              return f'''
            <text x="{x}" y="{y}" class="stat">{escape(label)}</text>
            <text x="{x + 265}" y="{y}" class="value">{value}</text>'''

          stats_rows = []

          stats_rows.append(stat_row("★ Total Stars Earned:", total_stars, 60, 72))
          stats_rows.append(stat_row("⑂ Total Repositories:", repo_count, 60, 96))
          stats_rows.append(stat_row("◌ Contributions last year:", total_contributions, 60, 120))
          stats_rows.append(stat_row("↳ Commits last year:", total_commits, 60, 144))

          optional_y = 72

          if total_prs > 0:
              stats_rows.append(stat_row("↱ Pull Requests:", total_prs, 420, optional_y))
              optional_y += 24

          if total_issues > 0:
              stats_rows.append(stat_row("● Issues:", total_issues, 420, optional_y))
              optional_y += 24

          if total_reviews > 0:
              stats_rows.append(stat_row("◆ Reviews:", total_reviews, 420, optional_y))
              optional_y += 24

          language_rows = []
          donut_paths = []

          start_angle = -90

          for index, (lang, data) in enumerate(top_languages):
              percent = data["size"] / total_language_size * 100
              color = data["color"]
              y = 72 + index * 26

              language_rows.append(f'''
            <circle cx="665" cy="{y - 5}" r="6" fill="{color}" />
            <text x="685" y="{y}" class="lang">{escape(lang)} {percent:.2f}%</text>''')

              end_angle = start_angle + percent / 100 * 360

              donut_paths.append(f'''
            <path d="{arc_path(925, 112, 55, start_angle, end_angle)}"
                  stroke="{color}"
                  stroke-width="14"
                  fill="none"
                  stroke-linecap="butt" />''')

              start_angle = end_angle

          svg = f'''<svg width="1100" height="255" viewBox="0 0 1100 255" fill="none" xmlns="http://www.w3.org/2000/svg" role="img">
            <style>
              .header {{ font: 700 22px 'Segoe UI', Ubuntu, Sans-Serif; fill: #58A6FF; }}
              .stat {{ font: 600 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #C3D1D9; }}
              .value {{ font: 700 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F0F6FC; }}
              .lang {{ font: 500 15px 'Segoe UI', Ubuntu, Sans-Serif; fill: #C3D1D9; }}
              .big {{ font: 800 30px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F0F6FC; }}
              .label {{ font: 600 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: #C3D1D9; }}
              .grade {{ font: 800 30px 'Segoe UI', Ubuntu, Sans-Serif; fill: #C3D1D9; }}
            </style>

            <rect x="0" y="0" width="1100" height="255" fill="#0D1117"/>

            <text x="60" y="38" class="header">Yaroslav's GitHub Stats</text>
            {''.join(stats_rows)}

            <circle cx="500" cy="112" r="31" fill="none" stroke="#58A6FF" stroke-width="7"/>
            <text x="481" y="122" class="grade">{grade}</text>

            <text x="660" y="38" class="header">Most Used Languages</text>
            {''.join(language_rows)}

            <circle cx="925" cy="112" r="55" fill="none" stroke="#30363D" stroke-width="14"/>
            {''.join(donut_paths)}

            <line x1="60" y1="174" x2="1040" y2="174" stroke="#30363D" stroke-width="3"/>

            <g transform="translate(300 220)">
              <text x="0" y="0" class="big">{total_contributions}</text>
              <text x="-28" y="24" class="label">Total Contributions</text>
            </g>

            <g transform="translate(535 220)">
              <circle cx="0" cy="-10" r="33" fill="none" stroke="#58A6FF" stroke-width="7"/>
              <text x="-9" y="0" class="big">{current_streak}</text>
              <text x="-38" y="34" class="label">Current Streak</text>
            </g>

            <g transform="translate(780 220)">
              <text x="0" y="0" class="big">{longest_streak}</text>
              <text x="-23" y="24" class="label">Longest Streak</text>
            </g>
          </svg>'''

          with open("profile/overview.svg", "w", encoding="utf-8") as file:
              file.write(svg)

          PY

          python3 generate_profile_cards.py

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update profile cards" || exit 0
          git push
