<svg width="1100" height="420" viewBox="0 0 1100 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <style>
    .panel-title { font: 700 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #58A6FF; }
    .stat-label { font: 600 16px 'Segoe UI', Ubuntu, Sans-Serif; fill: #C3D1D9; }
    .stat-value { font: 700 16px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F0F6FC; text-anchor: end; }
    .lang-name { font: 600 16px 'Segoe UI', Ubuntu, Sans-Serif; fill: #C3D1D9; }
    .lang-percent { font: 700 15px 'Segoe UI', Ubuntu, Sans-Serif; fill: #F0F6FC; text-anchor: end; }

    .metric-number {
      font: 800 34px 'Segoe UI', Ubuntu, Sans-Serif;
      fill: #F0F6FC;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .metric-label {
      font: 600 14px 'Segoe UI', Ubuntu, Sans-Serif;
      fill: #C3D1D9;
      text-anchor: middle;
    }

    .grade {
      font: 800 34px 'Segoe UI', Ubuntu, Sans-Serif;
      fill: #F0F6FC;
      text-anchor: middle;
      dominant-baseline: middle;
    }
  </style>

  <rect x="18" y="18" width="1064" height="384" rx="20" fill="#0D1117" stroke="#1F2937" filter="url(#shadow)" />

  <rect x="40" y="40" width="500" height="190" rx="18" fill="#111827" stroke="#1F2937" />
  <rect x="560" y="40" width="500" height="190" rx="18" fill="#111827" stroke="#1F2937" />

  <rect x="40" y="260" width="1020" height="120" rx="18" fill="#111827" stroke="#1F2937" />

  <text x="65" y="72" class="panel-title">Yaroslav's GitHub Stats</text>
  
  <text x="95" y="108" class="stat-label">Total Stars Earned</text>
  <text x="420" y="108" class="stat-value">6</text>
  <text x="95" y="138" class="stat-label">Total Repositories</text>
  <text x="420" y="138" class="stat-value">7</text>
  <text x="95" y="168" class="stat-label">Contributions last year</text>
  <text x="420" y="168" class="stat-value">60</text>
  <text x="95" y="198" class="stat-label">Commits last year</text>
  <text x="420" y="198" class="stat-value">52</text>

  <circle cx="470" cy="140" r="38" fill="none" stroke="#58A6FF" stroke-width="8"/>
  <text x="470" y="140" class="grade">B</text>

  <text x="585" y="72" class="panel-title">Most Used Languages</text>
  
  <circle cx="660" cy="102" r="7" fill="#b07219" />
  <text x="680" y="108" class="lang-name">Java</text>
  <text x="845" y="108" class="lang-percent">88.43%</text>
  <rect x="680" y="118" width="150" height="6" rx="3" fill="#1F2937" />
  <rect x="680" y="118" width="132.65" height="6" rx="3" fill="#b07219" />
  <circle cx="660" cy="136" r="7" fill="#00ADD8" />
  <text x="680" y="142" class="lang-name">Go</text>
  <text x="845" y="142" class="lang-percent">10.98%</text>
  <rect x="680" y="152" width="150" height="6" rx="3" fill="#1F2937" />
  <rect x="680" y="152" width="18.00" height="6" rx="3" fill="#00ADD8" />

  <circle cx="965" cy="145" r="64" fill="none" stroke="#1F2937" stroke-width="18"/>
  
  <path d="M 965.00 81.00 A 64 64 0 1 1 922.48 97.17"
        stroke="#b07219"
        stroke-width="18"
        fill="none"
        stroke-linecap="butt" />
  <path d="M 922.48 97.17 A 64 64 0 0 1 962.65 81.04"
        stroke="#00ADD8"
        stroke-width="18"
        fill="none"
        stroke-linecap="butt" />

  <line x1="380" y1="282" x2="380" y2="356" stroke="#1F2937" stroke-width="2"/>
  <line x1="720" y1="282" x2="720" y2="356" stroke="#1F2937" stroke-width="2"/>

  <g transform="translate(210 0)">
    <text x="0" y="308" class="metric-number">60</text>
    <text x="0" y="345" class="metric-label">Total Contributions</text>
  </g>

  <g transform="translate(550 0)">
    <circle cx="0" cy="304" r="28" fill="none" stroke="#58A6FF" stroke-width="7"/>
    <text x="0" y="304" class="metric-number">2</text>
    <text x="0" y="365" class="metric-label">Current Streak</text>
  </g>

  <g transform="translate(890 0)">
    <text x="0" y="308" class="metric-number">3</text>
    <text x="0" y="345" class="metric-label">Longest Streak</text>
  </g>
</svg>