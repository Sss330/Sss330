<svg
  width="350"
  height="215"
  viewBox="0 0 350 215"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
>
  <title>Most Used Languages</title>

  <style>
    .header {
      font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif;
      fill: #58A6FF;
      animation: fadeInAnimation 0.8s ease-in-out forwards;
    }

    .lang-name {
      font: 400 11px "Segoe UI", Ubuntu, Sans-Serif;
      fill: #C3D1D9;
    }

    .stagger {
      opacity: 0;
      animation: fadeInAnimation 0.3s ease-in-out forwards;
    }

    @keyframes fadeInAnimation {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>

  <rect x="0.5" y="0.5" rx="4.5" height="99%" width="349" fill="#0D1117" stroke="#e4e2e2" stroke-opacity="0" />

  <g transform="translate(25, 35)">
    <text x="0" y="0" class="header">Most Used Languages</text>
  </g>

  <g transform="translate(0, 55)">
    <svg x="25">
      <g transform="translate(0, 0)">
        
        <g transform="translate(0, 0)">
          <g class="stagger" style="animation-delay: 450ms">
            <circle cx="5" cy="6" r="5" fill="#b07219" />
            <text x="15" y="10" class="lang-name">Java 81.59%</text>
          </g>
        </g>
        <g transform="translate(0, 32)">
          <g class="stagger" style="animation-delay: 600ms">
            <circle cx="5" cy="6" r="5" fill="#e34c26" />
            <text x="15" y="10" class="lang-name">HTML 8.66%</text>
          </g>
        </g>
        <g transform="translate(0, 64)">
          <g class="stagger" style="animation-delay: 750ms">
            <circle cx="5" cy="6" r="5" fill="#663399" />
            <text x="15" y="10" class="lang-name">CSS 5.93%</text>
          </g>
        </g>
        <g transform="translate(0, 96)">
          <g class="stagger" style="animation-delay: 900ms">
            <circle cx="5" cy="6" r="5" fill="#f1e05a" />
            <text x="15" y="10" class="lang-name">JavaScript 1.89%</text>
          </g>
        </g>
        <g transform="translate(0, 128)">
          <g class="stagger" style="animation-delay: 1050ms">
            <circle cx="5" cy="6" r="5" fill="#00ADD8" />
            <text x="15" y="10" class="lang-name">Go 1.83%</text>
          </g>
        </g>

        <g transform="translate(125, -45)">
          <svg width="350" height="350">
            
        <g class="stagger" style="animation-delay: 600ms">
          <path d="M 116.67 60.00 A 56.66666666666667 56.66666666666667 0 1 1 64.79 93.87" stroke="#b07219" fill="none" stroke-width="12"></path>
        </g>
        <g class="stagger" style="animation-delay: 700ms">
          <path d="M 64.79 93.87 A 56.66666666666667 56.66666666666667 0 0 1 84.07 70.31" stroke="#e34c26" fill="none" stroke-width="12"></path>
        </g>
        <g class="stagger" style="animation-delay: 800ms">
          <path d="M 84.07 70.31 A 56.66666666666667 56.66666666666667 0 0 1 103.17 61.63" stroke="#663399" fill="none" stroke-width="12"></path>
        </g>
        <g class="stagger" style="animation-delay: 900ms">
          <path d="M 103.17 61.63 A 56.66666666666667 56.66666666666667 0 0 1 109.81 60.42" stroke="#f1e05a" fill="none" stroke-width="12"></path>
        </g>
        <g class="stagger" style="animation-delay: 1000ms">
          <path d="M 109.81 60.42 A 56.66666666666667 56.66666666666667 0 0 1 116.32 60.00" stroke="#00ADD8" fill="none" stroke-width="12"></path>
        </g>
          </svg>
        </g>
      </g>
    </svg>
  </g>
</svg>